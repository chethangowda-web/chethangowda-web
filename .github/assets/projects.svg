    <text x="20" y="54" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#8b9dc3">AI-Powered Healthcare Assistant</text>
    <text x="20" y="80" font-family="'JetBrains Mono', monospace" font-size="12" fill="#8b9dc3">MERN-stack app with an AI agent layer,</text>
    <text x="20" y="98" font-family="'JetBrains Mono', monospace" font-size="12" fill="#8b9dc3">built to make healthcare guidance more</text>
    <text x="20" y="116" font-family="'JetBrains Mono', monospace" font-size="12" fill="#8b9dc3">accessible and easier to navigate.</text>
    <g font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#0d1117" font-weight="600">
      <rect x="20" y="126" width="60" height="18" rx="9" fill="#22d3ee"/><text x="50" y="139" text-anchor="middle">MERN</text>
      <rect x="86" y="126" width="80" height="18" rx="9" fill="#8b5cf6"/><text x="126" y="139" text-anchor="middle" fill="#0d1117">AI Agents</text>
    </g>
  </g>

  <!-- Card 4: DSA Mentor -->
  <g transform="translate(470,240)">
    <rect width="390" height="150" rx="12" fill="#161b22" stroke="#8b5cf6" stroke-opacity="0.45" stroke-width="1.2"/>
    <text x="20" y="32" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700" fill="#e6edf3">DSA Mentor</text>
    <text x="20" y="54" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#8b9dc3">AI-Assisted Interview Prep</text>
    <text x="20" y="80" font-family="'JetBrains Mono', monospace" font-size="12" fill="#8b9dc3">Born out of my own interview-prep grind —</text>
    <text x="20" y="98" font-family="'JetBrains Mono', monospace" font-size="12" fill="#8b9dc3">an AI mentor built from real prep patterns</text>
    <text x="20" y="116" font-family="'JetBrains Mono', monospace" font-size="12" fill="#8b9dc3">to make DSA practice more practical.</text>
    <g font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#0d1117" font-weight="600">
      <rect x="20" y="126" width="80" height="18" rx="9" fill="#22d3ee"/><text x="60" y="139" text-anchor="middle">AI Agents</text>
      <rect x="106" y="126" width="55" height="18" rx="9" fill="#8b5cf6"/><text x="133" y="139" text-anchor="middle" fill="#0d1117">DSA</text>
    </g>
