  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#e6edf3">
    <g transform="translate(600,252)"><rect width="60" height="30" rx="15" fill="#161b22" stroke="#22d3ee" stroke-opacity="0.4"/><text x="30" y="20" text-anchor="middle">Git</text></g>
    <g transform="translate(670,252)"><rect width="100" height="30" rx="15" fill="#161b22" stroke="#8b5cf6" stroke-opacity="0.4"/><text x="50" y="20" text-anchor="middle">VS Code</text></g>
    <g transform="translate(780,252)"><rect width="90" height="30" rx="15" fill="#161b22" stroke="#22d3ee" stroke-opacity="0.4"/><text x="45" y="20" text-anchor="middle">Postman</text></g>
