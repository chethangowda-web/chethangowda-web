  <text x="600" y="90" font-family="'JetBrains Mono', monospace" font-size="13" fill="#8b9dc3">AI &amp; AGENT ENGINEERING</text>
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#0d1117" font-weight="600">
    <g transform="translate(600,102)"><rect width="105" height="30" rx="15" fill="#22d3ee"/><text x="52" y="20" text-anchor="middle">LangGraph</text></g>
    <g transform="translate(600,142)"><rect width="90" height="30" rx="15" fill="#8b5cf6"/><text x="45" y="20" text-anchor="middle" fill="#0d1117">Gemini</text></g>
    <g transform="translate(700,142)"><rect width="90" height="30" rx="15" fill="#22d3ee"/><text x="45" y="20" text-anchor="middle">Qdrant</text></g>
    <g transform="translate(600,182)"><rect width="80" height="30" rx="15" fill="#8b5cf6"/><text x="40" y="20" text-anchor="middle" fill="#0d1117">Groq</text></g>
