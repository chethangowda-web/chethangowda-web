  <text x="40" y="160" font-family="'JetBrains Mono', monospace" font-size="13" fill="#8b9dc3">FRAMEWORKS &amp; RUNTIME</text>
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#e6edf3">
    <g transform="translate(40,172)"><rect width="70" height="30" rx="15" fill="#161b22" stroke="#22d3ee" stroke-opacity="0.4"/><text x="35" y="20" text-anchor="middle">React</text></g>
    <g transform="translate(130,172)"><rect width="90" height="30" rx="15" fill="#161b22" stroke="#8b5cf6" stroke-opacity="0.4"/><text x="45" y="20" text-anchor="middle">Next.js</text></g>
    <g transform="translate(240,172)"><rect width="90" height="30" rx="15" fill="#161b22" stroke="#22d3ee" stroke-opacity="0.4"/><text x="45" y="20" text-anchor="middle">FastAPI</text></g>
    <g transform="translate(350,172)"><rect width="120" height="30" rx="15" fill="#161b22" stroke="#8b5cf6" stroke-opacity="0.4"/><text x="60" y="20" text-anchor="middle">Spring Boot</text></g>
