<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="tsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#131a2b"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="320" rx="18" fill="url(#tsBg)"/>
  <rect x="1.5" y="1.5" width="897" height="317" rx="18" fill="none" stroke="url(#tsGrad)" stroke-opacity="0.3" stroke-width="1.5"/>

  <text x="40" y="45" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700" fill="url(#tsGrad)">⚡ Tech Stack</text>
  <line x1="40" y1="58" x2="860" y2="58" stroke="#22d3ee" stroke-opacity="0.2"/>

  <!-- Row generator via manual placement -->
  <!-- Languages -->
  <text x="40" y="90" font-family="'JetBrains Mono', monospace" font-size="13" fill="#8b9dc3">LANGUAGES</text>
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#e6edf3">
    <g transform="translate(40,102)">
      <rect width="100" height="30" rx="15" fill="#161b22" stroke="#22d3ee" stroke-opacity="0.4"/>
      <text x="50" y="20" text-anchor="middle">JavaScript</text>
    </g>
    <g transform="translate(150,102)">
      <rect width="100" height="30" rx="15" fill="#161b22" stroke="#8b5cf6" stroke-opacity="0.4"/>
