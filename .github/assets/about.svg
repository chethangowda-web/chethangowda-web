<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="abGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="abBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#131a2b"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="340" rx="18" fill="url(#abBg)"/>
  <rect x="1.5" y="1.5" width="897" height="337" rx="18" fill="none" stroke="url(#abGrad)" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- terminal top bar -->
  <rect x="20" y="20" width="860" height="34" rx="8" fill="#161b22"/>
  <circle cx="42" cy="37" r="6" fill="#ff5f56"/>
  <circle cx="62" cy="37" r="6" fill="#ffbd2e"/>
  <circle cx="82" cy="37" r="6" fill="#27c93f"/>
  <text x="450" y="42" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#8b9dc3">about_me.py</text>

  <g font-family="'JetBrains Mono', monospace" font-size="15">
    <text x="45" y="90" fill="#8b5cf6">class</text>
    <text x="90" y="90" fill="#22d3ee">Chethan:</text>

    <text x="65" y="120" fill="#8b5cf6">def</text>
    <text x="100" y="120" fill="#e6edf3">__init__</text>
    <text x="180" y="120" fill="#8b9dc3">(self):</text>

    <text x="85" y="150" fill="#e6edf3">self.role</text>
    <text x="185" y="150" fill="#8b9dc3">=</text>
    <text x="205" y="150" fill="#a5e5ff">"Full-Stack Developer &amp; AI Agent Engineer"</text>

    <text x="85" y="178" fill="#e6edf3">self.rank</text>
    <text x="185" y="178" fill="#8b9dc3">=</text>
    <text x="205" y="178" fill="#a5e5ff">"2nd Year CSE @ Presidency University"</text>

    <text x="85" y="206" fill="#e6edf3">self.focus</text>
    <text x="190" y="206" fill="#8b9dc3">=</text>
    <text x="210" y="206" fill="#a5e5ff">["Agentic AI", "System Design", "Hackathons"]</text>

    <text x="85" y="234" fill="#e6edf3">self.languages</text>
    <text x="220" y="234" fill="#8b9dc3">=</text>
    <text x="240" y="234" fill="#a5e5ff">["JavaScript", "TypeScript", "Python", "Java"]</text>

    <text x="65" y="270" fill="#8b5cf6">def</text>
    <text x="100" y="270" fill="#e6edf3">current_mission</text>
    <text x="255" y="270" fill="#8b9dc3">(self):</text>
    <text x="105" y="298" fill="#8b5cf6">return</text>
    <text x="180" y="298" fill="#a5e5ff">"Shipping production AI-agent products, not demos."</text>
  </g>

  <rect x="700" y="298" width="10" height="20" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
